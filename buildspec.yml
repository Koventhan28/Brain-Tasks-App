version: 0.2

env:
  secrets-manager:
    # Format: ENV_VAR_NAME: "SecretName:KeyInsideSecret"
    DOCKERHUB_USERNAME: "docker_credentials:DOCKER_HUB_USERNAME"
    DOCKERHUB_PASSWORD: "docker_credentials:DOCKER_HUB_PASSWORD"

phases:
  install:
    commands:
      - curl -LO "https://k8s.io(curl -L -s https://k8s.io)/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl
  pre_build:
    commands:
      - echo "Logging into Docker Hub..."
      # Use --password-stdin to avoid exposing the password in logs
      - echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
  build:
    commands:
      - docker build -t braintaskapp:latest .
      - docker tag braintaskapp:latest koventhan/braintaskapp:latest
      - echo "Pushing the Docker image..."
      - docker push koventhan/braintaskapp:latest
  post_build:
    commands:
      - pwd
      - ls -ltr
      - kubectl get nodes
      - aws eks update-kubeconfig --name mycluster --region us-east-1
      - kubectl get nodes
      - kubectl apply -f nginx-deployment.yaml
      - kubectl apply -f service.yaml