version: 0.2

phases:
  pre_build:
    commands:
      # Commands to run before the build (e.g., login to a container registry)
      - echo "Running pre-build commands..."
      - echo $AWS_DEFAULT_REGION
      - echo $AWS_ACCOUNT_ID
      - env
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      
  build:
    commands:
      # Commands to build the application (e.g., compile code, build Docker image)
      - echo "Building the application..."
      - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_://region.amazonaws.com .
      -
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_://region.amazonaws.com
  post_build:
    commands:
      # Commands to run after the build (e.g., running tests, cleanup)
      - echo "Running post-build commands..."
      - echo "Build completed on `date`"

artifacts:
  files:
    # Files generated by the build to be uploaded to an S3 bucket for the next stage
    - '**/*'
  # The name of the output artifact. This can be overridden in the CodeBuild project settings.
  # name: my-build-artifact
